<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Gestion de Formation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family:'Segoe UI',sans-serif; min-height:100vh; background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); display:flex; align-items:center; justify-content:center; padding:20px; }
        .login-card { background:white; border-radius:20px; padding:40px; width:100%; max-width:450px; box-shadow:0 20px 60px rgba(0,0,0,0.3); }
        .login-header { text-align:center; margin-bottom:30px; }
        .login-header i { font-size:3.5em; color:#667eea; }
        .login-header h2 { margin:15px 0 5px; color:#333; font-weight:600; }
        .login-header p { color:#666; font-size:.9em; }
        .input-group-custom { display:flex; align-items:center; background:#f5f5f5; border-radius:12px; margin-bottom:20px; padding:8px 18px; border:2px solid transparent; transition:all .3s; }
        .input-group-custom:focus-within { border-color:#667eea; background:white; box-shadow:0 0 0 3px rgba(102,126,234,.2); }
        .input-group-custom i { color:#999; margin-right:12px; }
        .input-group-custom input { flex:1; border:none; background:transparent; padding:10px 0; font-size:1em; outline:none; }
        .btn-login { width:100%; padding:14px; background:linear-gradient(135deg,#667eea,#764ba2); border:none; border-radius:12px; color:white; font-size:1.1em; font-weight:600; cursor:pointer; transition:all .3s; }
        .btn-login:hover { transform:translateY(-2px); box-shadow:0 10px 25px rgba(102,126,234,.4); }
        .demo-box { background:#f8f9ff; border-radius:12px; padding:15px; margin-top:20px; font-size:.85em; }
        .demo-box p { font-weight:bold; color:#667eea; margin-bottom:8px; }
        .demo-box li { margin:4px 0; color:#555; }
        .login-footer { text-align:center; margin-top:20px; color:#999; font-size:.8em; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-header">
        <i class="fas fa-graduation-cap"></i>
        <h2>Gestion de Formation</h2>
        <p>Connectez-vous à votre espace</p>
    </div>
    <div th:if="${param.error}" class="alert alert-danger"><i class="fas fa-exclamation-circle"></i> Email ou mot de passe incorrect.</div>
    <div th:if="${param.logout}" class="alert alert-success"><i class="fas fa-check-circle"></i> Vous avez été déconnecté.</div>
    <form th:action="@{/login}" method="post">
        <div class="input-group-custom">
            <i class="fas fa-envelope"></i>
            <input type="email" name="email" placeholder="Email professionnel" required>
        </div>
        <div class="input-group-custom">
            <i class="fas fa-lock"></i>
            <input type="password" name="password" placeholder="Mot de passe" required>
        </div>
        <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt me-2"></i>Se connecter</button>
    </form>
    <div class="login-footer"><p>&copy; 2026 - Système de Gestion de Formation</p></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
