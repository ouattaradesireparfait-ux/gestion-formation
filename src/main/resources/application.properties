# =============================================
# CONFIGURATION LOCALE - H2 (développement)
# Pour la production, le profil "prod" est activé
# via SPRING_PROFILES_ACTIVE=prod sur Render
# =============================================

# Serveur
server.port=8080

# Base de donnees H2 persistante
spring.datasource.url=jdbc:h2:file:./data/gestion_formation;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Console H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=false

# Thymeleaf
spring.thymeleaf.cache=false

# Upload fichiers
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.org.springframework.security=WARN
logging.level.com.formation=INFO

