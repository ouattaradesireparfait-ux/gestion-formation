<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choisir une session - Espace Employé</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body{font-family:'Segoe UI',sans-serif;background:#f5f7fa;}
        .navbar{background:linear-gradient(135deg,#667eea,#764ba2);padding:15px 0;}
        .navbar-brand,.nav-link{color:white!important;}
        .user-menu{display:flex;align-items:center;gap:15px;color:white;}
        .session-card{background:white;border-radius:15px;padding:20px;margin-bottom:15px;border:2px solid #e0e4f0;transition:all .3s;}
        .session-card:hover{border-color:#667eea;box-shadow:0 8px 20px rgba(102,126,234,.15);}
        .page-title{margin-bottom:30px;border-left:5px solid #667eea;padding-left:20px;}
        .btn-choose{background:linear-gradient(135deg,#667eea,#764ba2);border:none;border-radius:25px;padding:8px 20px;color:white;}
        footer{background:white;text-align:center;padding:20px;margin-top:50px;border-top:1px solid #e0e4f0;}
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="#"><i class="fas fa-graduation-cap me-2"></i>Gestion Formation</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/employe/dashboard">Accueil</a></li>
                <li class="nav-item"><a class="nav-link active" href="/employe/demandes">Mes demandes</a></li>
                <li class="nav-item"><a class="nav-link" href="/employe/catalogue">Catalogue</a></li>
                <li class="nav-item"><a class="nav-link" href="/employe/mes-inscriptions">Mes inscriptions</a></li>
                <li class="nav-item"><a class="nav-link" href="/profil">Mon profil</a></li>
            </ul>
            <div class="user-menu ms-4">
                <i class="fas fa-user-circle"></i>
                <span th:text="${username}">Employé</span>
                <a href="/logout" style="color:white;"><i class="fas fa-sign-out-alt"></i></a>
            </div>
        </div>
    </div>
</nav>
<div class="container" style="max-width:900px;padding:30px 20px;">
    <div class="page-title">
        <h1>Choisir une session</h1>
        <p>Formation : <strong th:text="${demande.formation.nomFormation}">-</strong></p>
    </div>
    <form th:action="@{/employe/choisir-session}" method="post">
        <input type="hidden" name="demandeId" th:value="${demande.id}">
        <div th:each="sess : ${sessions}" class="session-card">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h5 class="mb-1"><i class="fas fa-calendar-alt me-2 text-primary"></i>
                        <span th:text="${#temporals.format(sess.dateDebut,'dd/MM/yyyy')}">-</span>
                        →
                        <span th:text="${#temporals.format(sess.dateFin,'dd/MM/yyyy')}">-</span>
                    </h5>
                    <p class="text-muted mb-0">
                        <i class="fas fa-map-marker-alt me-2"></i><span th:text="${sess.lieu}">-</span>
                        &nbsp;&nbsp;
                        <i class="fas fa-users me-2"></i><span th:text="${sess.placesDisponibles}">0</span> / <span th:text="${sess.placesMax}">0</span> places disponibles
                    </p>
                </div>
                <button type="submit" name="sessionId" th:value="${sess.id}" class="btn-choose">
                    <i class="fas fa-check me-1"></i>Choisir
                </button>
            </div>
        </div>
        <div th:if="${sessions.isEmpty()}" class="alert alert-warning">
            <i class="fas fa-exclamation-triangle me-2"></i>Aucune session disponible pour cette formation.
        </div>
    </form>
    <a href="/employe/demandes" class="btn btn-outline-secondary mt-3"><i class="fas fa-arrow-left me-2"></i>Retour</a>
</div>
<footer><p>&copy; 2026 - Système de Gestion de Formation</p></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
