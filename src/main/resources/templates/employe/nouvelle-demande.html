<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouvelle demande - Espace Employé</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body{font-family:'Segoe UI',sans-serif;background:#f5f7fa;}
        .navbar{background:linear-gradient(135deg,#667eea,#764ba2);padding:15px 0;}
        .navbar-brand,.nav-link{color:white!important;}
        .user-menu{display:flex;align-items:center;gap:15px;color:white;}
        .form-card{background:white;border-radius:20px;padding:30px;box-shadow:0 5px 20px rgba(0,0,0,.05);}
        .page-title{margin-bottom:30px;border-left:5px solid #667eea;padding-left:20px;}
        .btn-submit{background:linear-gradient(135deg,#667eea,#764ba2);border:none;border-radius:10px;padding:12px;width:100%;color:white;font-weight:600;}
        footer{background:white;text-align:center;padding:20px;margin-top:50px;border-top:1px solid #e0e4f0;}
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="#"><i class="fas fa-graduation-cap me-2"></i>Gestion Formation</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/employe/dashboard">Accueil</a></li>
                <li class="nav-item"><a class="nav-link active" href="/employe/demandes">Mes demandes</a></li>
                <li class="nav-item"><a class="nav-link" href="/employe/catalogue">Catalogue</a></li>
                <li class="nav-item"><a class="nav-link" href="/employe/mes-inscriptions">Mes inscriptions</a></li>
                <li class="nav-item"><a class="nav-link" href="/profil">Mon profil</a></li>
            </ul>
            <div class="user-menu ms-4">
                <i class="fas fa-user-circle"></i>
                <span th:text="${username}">Employé</span>
                <a href="/logout" style="color:white;"><i class="fas fa-sign-out-alt"></i></a>
            </div>
        </div>
    </div>
</nav>
<div class="container" style="max-width:800px;padding:30px 20px;">
    <div class="page-title"><h1>Nouvelle demande de formation</h1><p>Complétez le formulaire pour faire votre demande</p></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div class="form-card">
        <form action="/employe/nouvelle-demande" method="POST">
            <div class="mb-3">
                <label class="form-label fw-bold">Formation souhaitée *</label>
                <select class="form-select" name="formationId" required>
                    <option value="">Sélectionnez une formation</option>
                    <option th:each="f : ${formations}"
                            th:value="${f.id}"
                            th:text="${f.nomFormation} + ' (' + ${f.dureeHeures} + 'h)'"
                            th:selected="${formationId != null and formationId == f.id}">
                    </option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Motivation *</label>
                <textarea class="form-control" name="motivation" rows="5"
                          placeholder="Expliquez pourquoi vous souhaitez suivre cette formation..." required></textarea>
            </div>
            <button type="submit" class="btn-submit"><i class="fas fa-paper-plane me-2"></i>Envoyer la demande</button>
            <a href="/employe/demandes" class="btn btn-secondary w-100 mt-2"><i class="fas fa-times me-2"></i>Annuler</a>
        </form>
    </div>
</div>
<footer><p>&copy; 2026 - Système de Gestion de Formation</p></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
